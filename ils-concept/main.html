<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILS Concepts — 계기착륙시설 기초 개념 학습</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&family=Bebas+Neue&display=swap');

:root {
  --bg:       #0a0e1a;
  --bg2:      #111827;
  --bg3:      #1a2236;
  --accent:   #00d4ff;
  --accent2:  #ff6b35;
  --accent3:  #7c3aed;
  --green:    #10b981;
  --yellow:   #f59e0b;
  --text:     #e2e8f0;
  --text-dim: #94a3b8;
  --border:   rgba(0,212,255,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background:
    radial-gradient(ellipse 70% 55% at 15% 10%, rgba(0,180,220,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 88% 85%, rgba(100,50,210,0.16) 0%, transparent 55%),
    radial-gradient(ellipse 80% 40% at 50% 100%, rgba(10,20,50,0.9) 0%, transparent 70%),
    linear-gradient(160deg, #080d18 0%, #0a0e1a 40%, #0b1022 100%);
  color: var(--text);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  overflow-x: hidden;
}

/* 격자 레이어 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
  background-size: 52px 52px;
  -webkit-mask-image: radial-gradient(ellipse 90% 90% at 50% 40%, black 30%, transparent 100%);
  mask-image: radial-gradient(ellipse 90% 90% at 50% 40%, black 30%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}
/* 상단 글로우 호 */
body::after {
  content: '';
  position: fixed;
  top: -120px; left: 50%;
  transform: translateX(-50%);
  width: 900px; height: 400px;
  background: radial-gradient(ellipse at 50% 0%, rgba(0,212,255,0.10) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

/* ── 메인 히어로 ── */
.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 40px 48px;
  position: relative;
  z-index: 1;
  text-align: center;
}

/* 상단 로고 */



  50% { opacity: 0.4; }
}

/* 메인 타이틀 */
.hero-eyebrow {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 20px;
  opacity: 0.18;
}
.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(72px, 14vw, 130px);
  line-height: 0.9;
  letter-spacing: 6px;
  color: #fff;
  margin-bottom: 8px;
}
.hero-title-sub {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(28px, 5vw, 52px);
  letter-spacing: 8px;
  color: var(--accent);
  margin-bottom: 16px;
  opacity: 0.85;
}
.hero-desc {
  margin-top: 0;
  font-size: 16px;
  color: var(--text-dim);
  line-height: 1.8;
  max-width: 520px;
  margin: 0 auto 48px;
  font-weight: 300;
}

/* CTA 버튼 */



.hero-cta:hover 

/* 통계 */






/* ── 카드 섹션 ── */
















.concept-card:hover 

/* 카테고리 색상 바 */


/* ── 푸터 ── */






@media (max-width: 640px) {
  .hero { padding: 60px 24px 40px; }
  
  
  
  
  
}

/* 히어로 타이틀 글로우 */
.hero-title {
  text-shadow: 0 0 80px rgba(0,212,255,0.15);
}
.hero-title-sub {
  text-shadow: 0 0 40px rgba(0,212,255,0.2);
}
/* 통계 섹션 반투명 배경 */

/* 카드 섹션 위 구분선 글로우 */


/* 비행기 배경 이미지 — ILS 글자 뒤 중앙 배경으로 배치 */
.plane-bg {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 70vw;
  max-width: 820px;
  opacity: 0.18;
  pointer-events: none;
  z-index: 0;
  mix-blend-mode: screen;
  filter: brightness(1.2) contrast(1.0);
}

/* 히어로 텍스트는 비행기 위에 — 명시적으로 z-index 보강 */
.hero { z-index: 2; }
.hero-title, .hero-title-sub, .hero-eyebrow, .hero-desc { position: relative; z-index: 2; }
</style>
</head>
